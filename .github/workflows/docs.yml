name: Build Web to gh-pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo (with submodules if needed)
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # 2. Setup Python
      - uses: actions/setup-python@v5
        with:
          python-version: 3.x

      # 3. Install Zensical
      - run: pip install zensical

      # 4. Build site
      - run: zensical build --clean

      # 5. Checkout gh-pages branch
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      # 6. Copy build output into gh-pages
      - name: Copy site to gh-pages
        run: |
          rm -rf gh-pages/*
          cp -r site/* gh-pages/

      # 7. Commit and push to gh-pages
      - name: Deploy to gh-pages branch
        run: |
          cd gh-pages
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "deploy docs" || echo "No changes"
          git push